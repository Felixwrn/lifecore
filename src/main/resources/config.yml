# 🎮 Spielmodus
mode: LIFESTEAL

# ❤️ Start Leben pro Spieler
start-lives: 10

# 🧠 Storage System
storage:
  type: FILE # FILE oder MYSQL

# 🗄️ MySQL Einstellungen (nur wenn type: MYSQL)
mysql:
  host: localhost
  port: 3306
  database: lifedb
  user: root
  password: password

# 🧛 Lifesteal Einstellungen
lifesteal:
  steal-amount: 1
  max-lives: 20

# 💀 Hardcore Einstellungen
hardcore:
  ban-on-zero: false
