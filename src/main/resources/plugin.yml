name: LifePlugin
version: 1.0
main: de.felix.lifeplugin.Main
api-version: 1.21

commands:
  livesgui:
    description: Öffnet die Life GUI
    usage: /livesgui

  mode:
    description: Setzt den Spielmodus (HARDCORE / LIFESTEAL)
    usage: /mode <HARDCORE|LIFESTEAL>

permissions:
  lifeplugin.admin:
    description: Erlaubt Mode Änderungen
    default: op
