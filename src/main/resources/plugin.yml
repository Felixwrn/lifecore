name: LifeCore
version: 2.0-Beta
main: de.felix.lifeplugin.Main
api-version: 1.21
author: WRNlabs

depend:
  - WRN-API

commands:

  livesgui:
    description: Opens the Lives GUI
    usage: /livesgui
    aliases:
      - lives
      - leben
      - life
    permission: life.admin

  langgui:
    description: Opens the Language GUI
    usage: /langgui
    aliases:
      - lang
      - language
      - langs

  modegui:
    description: Opens the Mode GUI
    usage: /modegui
    aliases:
      - mode
      - modes
    permission: life.mode

 # market:
  #  description: Opens the Marketplace
   # usage: /market 

permissions:

  life.admin:
    description: Allows editing player lives
    default: op

  life.mode:
    description: Allows to edit the server mode
    default: op
